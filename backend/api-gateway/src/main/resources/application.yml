server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
            - "http://localhost:8100"
            - "http://localhost"
            - "https://localhost"
            - "capacitor://localhost"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST

      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

        - id: chat-conversations-service
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/api/conversations/**

        - id: chat-messages-service
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/api/messages/**

        - id: chat-websocket-service
          uri: lb:ws://CHAT-SERVICE
          predicates:
            - Path=/ws/**
            - Header=Upgrade, websocket

        - id: chat-websocket-sockjs-service
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/ws/**

        - id: bot-service
          uri: lb://BOT-SERVICE
          predicates:
            - Path=/api/bot/**

        - id: library-service
          uri: lb://LIBRARY-SERVICE
          predicates:
            - Path=/api/library/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway